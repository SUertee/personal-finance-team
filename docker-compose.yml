services:
  n8n:
    dns:
      - 8.8.8.8
      - 8.8.4.4
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_CORS_ALLOW_ORIGIN=*
      - N8N_CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - N8N_CORS_ALLOW_HEADERS=*
      - TZ=Australia/Sydney
    volumes:
      - ~/.n8n:/home/node/.n8n
    restart: always

  db:
    image: pgvector/pgvector:pg16
    container_name: personal-finance-team-db
    ports:
      - "127.0.0.1:15433:5432"
    environment:
      - POSTGRES_DB=personal_finance
      - POSTGRES_USER=personal_finance_user
      - POSTGRES_PASSWORD=personal_finance_password
    volumes:
      - ./storage/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_finance_user -d personal_finance"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always

  server:
    build:
      context: ./server
    container_name: finance-ai-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18000:8000"
    env_file:
      - ./server/.env
    environment:
      # Override DSN for Docker internal networking (env_file provides all other vars)
      - POSTGRES_DSN=postgresql://personal_finance_user:personal_finance_password@db:5432/personal_finance
      - ALLOWED_ORIGINS=http://localhost:5173
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TZ=Australia/Sydney
    restart: unless-stopped

